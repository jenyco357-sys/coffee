<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk WhatsApp Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-size: 2.5em;
        }
        
        .warning {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-weight: 500;
        }
        
        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }
        
        textarea, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        textarea:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            height: 200px;
            resize: vertical;
        }
        
        .phone-list {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }
        
        .phone-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px;
            background: white;
            border-radius: 5px;
            border: 1px solid #dee2e6;
        }
        
        .phone-number {
            flex: 1;
            font-family: monospace;
            font-size: 16px;
        }
        
        .status {
            width: 100px;
            text-align: center;
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status.pending {
            background: #ffc107;
            color: #856404;
        }
        
        .status.sent {
            background: #28a745;
            color: white;
        }
        
        .status.failed {
            background: #dc3545;
            color: white;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e9ecef;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #6c757d;
            font-size: 14px;
        }
        
        .delay-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
        }
        
        .delay-control input {
            width: 100px;
        }
        
        .sample-data {
            margin-top: 15px;
            font-size: 12px;
            color: #6c757d;
        }
        
        .sample-data button {
            background: none;
            border: 1px solid #dee2e6;
            padding: 3px 10px;
            border-radius: 15px;
            cursor: pointer;
            margin-left: 10px;
        }
        
        .sample-data button:hover {
            background: #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Bulk WhatsApp Messenger</h1>
        
        <div class="warning">
            ⚠️ This tool opens WhatsApp Web for each number. You need to manually click send.
            For automated bulk messaging, use official WhatsApp Business API.
        </div>
        
        <div class="input-section">
            <div>
                <div class="form-group">
                    <label>📝 Message Template:</label>
                    <textarea id="messageTemplate" placeholder="Enter your message here...">Hello! This is a test message sent via Bulk WhatsApp Tool. Have a great day! 😊</textarea>
                </div>
                
                <div class="form-group">
                    <label>⏱️ Delay between messages (seconds):</label>
                    <div class="delay-control">
                        <input type="number" id="delayTime" min="1" max="30" value="3">
                        <span>seconds</span>
                    </div>
                </div>
            </div>
            
            <div>
                <div class="form-group">
                    <label>📞 Phone Numbers (one per line):</label>
                    <textarea id="phoneNumbers" placeholder="+1234567890&#10;+1987654321&#10;+1122334455" rows="8"></textarea>
                </div>
                <div class="sample-data">
                    Format: Country code + number (e.g., +1234567890)
                    <button onclick="loadSampleNumbers()">Load Sample</button>
                </div>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Total Numbers</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="sentCount">0</div>
                <div class="stat-label">Sent</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="pendingCount">0</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div style="text-align: center; margin: 20px 0;">
            <button class="btn btn-primary" onclick="startSending()">🚀 Start Sending</button>
            <button class="btn btn-success" onclick="pauseSending()">⏸️ Pause</button>
            <button class="btn btn-danger" onclick="resetAll()">🔄 Reset</button>
        </div>
        
        <div class="phone-list" id="phoneList">
            <!-- Phone numbers will be listed here dynamically -->
        </div>
    </div>

    <script>
        let phoneNumbers = [];
        let currentIndex = 0;
        let isPaused = false;
        let timeoutId = null;
        
        function loadSampleNumbers() {
            document.getElementById('phoneNumbers').value = 
                '+1234567890\n+1987654321\n+1122334455\n+14255550123\n+442071234567';
            updatePhoneList();
        }
        
        function updatePhoneList() {
            const numbersText = document.getElementById('phoneNumbers').value;
            phoneNumbers = numbersText.split('\n')
                .map(num => num.trim())
                .filter(num => num && /^\+?[\d\s-]+$/.test(num));
            
            const listHtml = phoneNumbers.map((num, index) => `
                <div class="phone-item" id="phone-${index}">
                    <span class="phone-number">${num}</span>
                    <span class="status pending" id="status-${index}">Pending</span>
                </div>
            `).join('');
            
            document.getElementById('phoneList').innerHTML = listHtml || '<p style="text-align: center; color: #999;">No phone numbers added yet</p>';
            
            // Update stats
            document.getElementById('totalCount').textContent = phoneNumbers.length;
            updateStats();
        }
        
        function updateStats() {
            const sent = document.querySelectorAll('.status.sent').length;
            const pending = document.querySelectorAll('.status.pending').length;
            
            document.getElementById('sentCount').textContent = sent;
            document.getElementById('pendingCount').textContent = pending;
            
            const progress = (sent / phoneNumbers.length) * 100 || 0;
            document.getElementById('progressFill').style.width = progress + '%';
        }
        
        function updateStatus(index, status) {
            const statusElement = document.getElementById(`status-${index}`);
            if (statusElement) {
                statusElement.className = `status ${status}`;
                statusElement.textContent = status.charAt(0).toUpperCase() + status.slice(1);
            }
            updateStats();
        }
        
        function openWhatsApp(number, message) {
            // Format phone number (remove spaces, dashes, etc.)
            const cleanNumber = number.replace(/[\s-]/g, '');
            
            // Create WhatsApp URL
            const url = `https://wa.me/${cleanNumber}?text=${encodeURIComponent(message)}`;
            
            // Open in new tab
            window.open(url, '_blank');
        }
        
        function sendNext() {
            if (isPaused || currentIndex >= phoneNumbers.length) {
                if (currentIndex >= phoneNumbers.length) {
                    alert('✅ All messages processed!');
                }
                return;
            }
            
            const number = phoneNumbers[currentIndex];
            const message = document.getElementById('messageTemplate').value;
            
            if (!message.trim()) {
                alert('Please enter a message');
                return;
            }
            
            // Update status to sending
            updateStatus(currentIndex, 'sent');
            
            // Open WhatsApp
            openWhatsApp(number, message);
            
            currentIndex++;
            
            // Schedule next message
            if (currentIndex < phoneNumbers.length) {
                const delay = parseInt(document.getElementById('delayTime').value) * 1000;
                timeoutId = setTimeout(sendNext, delay);
            } else {
                updateStats();
            }
        }
        
        function startSending() {
            if (phoneNumbers.length === 0) {
                alert('Please add phone numbers first');
                return;
            }
            
            if (!document.getElementById('messageTemplate').value.trim()) {
                alert('Please enter a message');
                return;
            }
            
            isPaused = false;
            
            if (currentIndex === 0 || currentIndex >= phoneNumbers.length) {
                // Reset if starting from beginning or completed
                resetProgress();
            }
            
            sendNext();
        }
        
        function pauseSending() {
            isPaused = true;
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
        }
        
        function resetProgress() {
            // Reset all statuses to pending
            for (let i = 0; i < phoneNumbers.length; i++) {
                updateStatus(i, 'pending');
            }
            currentIndex = 0;
            isPaused = false;
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
        }
        
        function resetAll() {
            document.getElementById('phoneNumbers').value = '';
            document.getElementById('messageTemplate').value = 'Hello! This is a test message sent via Bulk WhatsApp Tool. Have a great day! 😊';
            document.getElementById('delayTime').value = 3;
            phoneNumbers = [];
            currentIndex = 0;
            isPaused = false;
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            updatePhoneList();
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            updatePhoneList();
            
            // Add input listener for real-time updates
            document.getElementById('phoneNumbers').addEventListener('input', updatePhoneList);
        });
        
        // Prevent accidental navigation
        window.addEventListener('beforeunload', function (e) {
            if (currentIndex > 0 && currentIndex < phoneNumbers.length) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
</body>
</html>
